name: Publish Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      registry_changed: ${{ steps.registry_changes.outputs.changed }}
      registry_version: ${{ steps.registry_version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Detect registry changes
        if: github.event_name == 'push'
        id: registry_changes
        run: |
          if git diff --quiet "${{ github.event.before }}" "${{ github.sha }}" -- registry.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide version bump
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        id: bump_decision
        run: |
          HEAD_COMMIT_MESSAGE="$(git log -1 --format=%B)"
          shopt -s nocasematch

          if [[ "$HEAD_COMMIT_MESSAGE" == *"[skip bump]"* || "$HEAD_COMMIT_MESSAGE" == *"[skip-bump]"* || "$HEAD_COMMIT_MESSAGE" == *"[no bump]"* || "$HEAD_COMMIT_MESSAGE" == *"[no-bump]"* ]]; then
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$HEAD_COMMIT_MESSAGE" == *"[force bump]"* || "$HEAD_COMMIT_MESSAGE" == *"[force-bump]"* || "$HEAD_COMMIT_MESSAGE" == *"[bump]"* ]]; then
            echo "should_bump=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ steps.registry_changes.outputs.changed }}" = "true" ]; then
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "${{ github.event.before }}" "${{ github.sha }}" -- src; then
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_bump=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump registry version
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]' && steps.bump_decision.outputs.should_bump == 'true'
        run: node ./scripts/bump-registry-version.mjs

      - name: Commit bumped version
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]' && steps.bump_decision.outputs.should_bump == 'true'
        run: |
          if git diff --quiet -- registry.json; then
            exit 0
          fi

          version="$(node -p "JSON.parse(require('node:fs').readFileSync('registry.json', 'utf8')).version")"
          git add registry.json
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
            commit -m "chore: bump registry version to ${version}"
          git push

      - name: Read registry version
        id: registry_version
        run: |
          version="$(node -p 'JSON.parse(require("node:fs").readFileSync("registry.json", "utf8")).version')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Install OCX
        run: npm install --global ocx

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build registry
        run: ./scripts/build-registry.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    if: github.event_name == 'push' && needs.build.outputs.registry_changed == 'true'
    needs:
      - build
      - deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.registry_version }}
        run: |
          tag="v${VERSION}"

          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            exit 0
          fi

          gh release create "$tag" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "notify-kitty ${VERSION}" \
            --generate-notes
